<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 40px 0 30px;
        }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: #aaa; font-size: 1.1rem; }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,87,108,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
        }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(56,239,125,0.3); }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
        }
        .btn-whatsapp:hover { background: #1da851; }
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ccc;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #f093fb;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-item {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .option-item input[type="text"] { flex: 1; }
        .option-item input[type="url"] { flex: 2; }
        .option-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
        .option-item .remove-btn {
            background: #ff4757;
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .survey-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .survey-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        .survey-card .cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .survey-card .info { padding: 20px; }
        .survey-card h3 { font-size: 1.3rem; margin-bottom: 6px; }
        .survey-card p { color: #aaa; font-size: 0.9rem; }
        .survey-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            color: #888;
            font-size: 0.85rem;
        }
        .vote-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            margin-bottom: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }
        .vote-option:hover { border-color: rgba(240,147,251,0.5); background: rgba(255,255,255,0.08); }
        .vote-option.selected { border-color: #f093fb; background: rgba(240,147,251,0.15); }
        .vote-option img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .vote-option .option-text { flex: 1; }
        .vote-option .option-text h4 { font-size: 1.1rem; margin-bottom: 4px; }
        .vote-option .check-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .vote-option.selected .check-icon {
            background: #f093fb;
            border-color: #f093fb;
        }
        .result-bar {
            margin-bottom: 16px;
        }
        .result-bar .bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            align-items: center;
        }
        .result-bar .bar-header img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }
        .result-bar .bar-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .result-bar .bar-info h4 { font-size: 1rem; }
        .result-bar .percentage { font-weight: 700; font-size: 1.1rem; color: #f093fb; }
        .result-bar .bar-track {
            height: 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .result-bar .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            min-width: 2px;
        }
        .share-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-active { background: rgba(56,239,125,0.2); color: #38ef7d; }
        .badge-expired { background: rgba(255,71,87,0.2); color: #ff4757; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
        .empty-state h3 { color: #ccc; margin-bottom: 8px; }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 20px 0;
        }
        .total-votes {
            text-align: center;
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 20px;
        }
        .total-votes strong { color: #f093fb; font-size: 1.3rem; }
        .back-btn {
            background: none;
            border: none;
            color: #f093fb;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        .back-btn:hover { text-decoration: underline; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #38ef7d;
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 999;
            transition: transform 0.4s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .option-item { flex-wrap: wrap; }
            .option-item input[type="url"] { flex: 1 1 100%; }
            .card { padding: 20px; }
            .share-buttons { flex-direction: column; }
            .share-buttons .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Encuestas Web</h1>
            <p>Crea votaciones y compartilas con quien quieras</p>
        </header>

        <div id="app">
            <!-- Vista principal: lista de encuestas -->
            <div id="view-list" class="view active">
                <div class="nav-bar">
                    <button class="btn btn-primary" onclick="showView('view-create')">+ Nueva Encuesta</button>
                </div>
                <div id="survey-list"></div>
            </div>

            <!-- Vista: crear encuesta -->
            <div id="view-create" class="view" style="display:none;">
                <button class="back-btn" onclick="showView('view-list')">← Volver</button>
                <div class="card">
                    <h2 style="margin-bottom:20px;">Crear Encuesta</h2>
                    <div class="form-group">
                        <label>Título de la encuesta</label>
                        <input type="text" id="survey-title" placeholder="Ej: ¿Cuál es tu color favorito?">
                    </div>
                    <div class="form-group">
                        <label>Descripción (opcional)</label>
                        <textarea id="survey-desc" placeholder="Describe de qué trata tu encuesta..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>URL de imagen de portada (opcional)</label>
                        <input type="url" id="survey-cover" placeholder="https://ejemplo.com/imagen.jpg">
                    </div>
                    <div class="form-group">
                        <label>Fecha de expiración (opcional)</label>
                        <input type="datetime-local" id="survey-expiry">
                    </div>

                    <div class="divider"></div>

                    <h3 style="margin-bottom:16px;">Opciones de votación</h3>
                    <div id="options-list" class="options-list"></div>
                    <button class="btn btn-secondary" onclick="addOption()" style="margin-top:12px;">+ Agregar opción</button>

                    <div class="divider"></div>

                    <button class="btn btn-primary" onclick="createSurvey()" style="width:100%;justify-content:center;">Crear Encuesta</button>
                </div>
            </div>

            <!-- Vista: votar -->
            <div id="view-vote" class="view" style="display:none;">
                <button class="back-btn" onclick="showView('view-list')">← Volver</button>
                <div class="card" id="vote-content"></div>
            </div>

            <!-- Vista: resultados -->
            <div id="view-results" class="view" style="display:none;">
                <button class="back-btn" onclick="showView('view-list')">← Volver</button>
                <div class="card" id="results-content"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let surveys = JSON.parse(localStorage.getItem('encuestas') || '[]');
        let selectedOption = null;
        let currentSurveyId = null;

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function save() {
            localStorage.setItem('encuestas', JSON.stringify(surveys));
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if (id === 'view-list') renderList();
        }

        function addOption() {
            const list = document.getElementById('options-list');
            const idx = list.children.length + 1;
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerHTML = `
                <input type="text" placeholder="Opción ${idx}" class="opt-name">
                <input type="url" placeholder="URL imagen (opcional)" class="opt-img">
                <img src="" class="opt-preview" style="display:none;" onerror="this.style.display='none'">
                <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
            `;
            div.querySelector('.opt-img').addEventListener('input', function() {
                const preview = div.querySelector('.opt-preview');
                if (this.value) {
                    preview.src = this.value;
                    preview.style.display = 'block';
                } else {
                    preview.style.display = 'none';
                }
            });
            list.appendChild(div);
        }

        function createSurvey() {
            const title = document.getElementById('survey-title').value.trim();
            const desc = document.getElementById('survey-desc').value.trim();
            const cover = document.getElementById('survey-cover').value.trim();
            const expiry = document.getElementById('survey-expiry').value;

            if (!title) { showToast('Poné un título'); return; }

            const options = [];
            document.querySelectorAll('.option-item').forEach(item => {
                const name = item.querySelector('.opt-name').value.trim();
                const img = item.querySelector('.opt-img').value.trim();
                if (name) options.push({ name, img, votes: 0 });
            });

            if (options.length < 2) { showToast('Agregá al menos 2 opciones'); return; }

            const survey = {
                id: generateId(),
                title,
                desc,
                cover,
                expiry,
                options,
                createdAt: new Date().toISOString(),
                voters: []
            };

            surveys.push(survey);
            save();

            document.getElementById('survey-title').value = '';
            document.getElementById('survey-desc').value = '';
            document.getElementById('survey-cover').value = '';
            document.getElementById('survey-expiry').value = '';
            document.getElementById('options-list').innerHTML = '';

            showToast('Encuesta creada');
            showView('view-list');
        }

        function renderList() {
            const container = document.getElementById('survey-list');
            if (surveys.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📊</div>
                        <h3>No hay encuestas</h3>
                        <p>Creá tu primera encuesta para empezar</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = surveys.slice().reverse().map(s => {
                const total = s.options.reduce((a, o) => a + o.votes, 0);
                const isExpired = s.expiry && new Date(s.expiry) < new Date();
                const coverHtml = s.cover
                    ? `<img class="cover" src="${s.cover}" onerror="this.style.display='none'" alt="">`
                    : `<div class="cover" style="background:linear-gradient(135deg,#f093fb,#f5576c);height:180px;display:flex;align-items:center;justify-content:center;font-size:3rem;">📊</div>`;
                return `
                    <div class="survey-card" onclick="openSurvey('${s.id}')">
                        ${coverHtml}
                        <div class="info">
                            <h3>${s.title}</h3>
                            ${s.desc ? `<p>${s.desc}</p>` : ''}
                            <div class="meta">
                                <span>${total} voto${total !== 1 ? 's' : ''} · ${s.options.length} opciones</span>
                                <span class="badge ${isExpired ? 'badge-expired' : 'badge-active'}">${isExpired ? 'Cerrada' : 'Activa'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openSurvey(id) {
            currentSurveyId = id;
            const s = surveys.find(x => x.id === id);
            if (!s) return;

            const isExpired = s.expiry && new Date(s.expiry) < new Date();
            const hasVoted = s.voters.includes(getFingerprint());
            const total = s.options.reduce((a, o) => a + o.votes, 0);

            if (hasVoted || isExpired) {
                renderResults(s, total);
                return;
            }

            selectedOption = null;

            const coverHtml = s.cover
                ? `<img src="${s.cover}" style="width:100%;height:200px;object-fit:cover;border-radius:14px;margin-bottom:20px;" onerror="this.style.display='none'">`
                : '';

            document.getElementById('vote-content').innerHTML = `
                ${coverHtml}
                <h2 style="margin-bottom:8px;">${s.title}</h2>
                ${s.desc ? `<p style="color:#aaa;margin-bottom:20px;">${s.desc}</p>` : ''}
                ${s.expiry ? `<p style="color:#888;font-size:0.85rem;margin-bottom:16px;">Cierra: ${new Date(s.expiry).toLocaleString('es-AR')}</p>` : ''}
                <p style="color:#aaa;margin-bottom:16px;">Elegí una opción y votá</p>
                ${s.options.map((o, i) => `
                    <div class="vote-option" onclick="selectOption(${i})" id="opt-${i}">
                        ${o.img ? `<img src="${o.img}" onerror="this.style.display='none'">` : ''}
                        <div class="option-text"><h4>${o.name}</h4></div>
                        <div class="check-icon" id="check-${i}">✓</div>
                    </div>
                `).join('')}
                <button class="btn btn-primary" onclick="castVote()" id="vote-btn" style="width:100%;justify-content:center;margin-top:16px;" disabled>Votar</button>
            `;

            showView('view-vote');
        }

        function selectOption(idx) {
            selectedOption = idx;
            document.querySelectorAll('.vote-option').forEach((el, i) => {
                el.classList.toggle('selected', i === idx);
            });
            document.getElementById('vote-btn').disabled = false;
        }

        function getFingerprint() {
            let fp = localStorage.getItem('voter_fp');
            if (!fp) {
                fp = Math.random().toString(36).substr(2, 12);
                localStorage.setItem('voter_fp', fp);
            }
            return fp;
        }

        function castVote() {
            if (selectedOption === null) return;
            const s = surveys.find(x => x.id === currentSurveyId);
            if (!s) return;

            const fp = getFingerprint();
            if (s.voters.includes(fp)) {
                showToast('Ya votaste');
                return;
            }

            s.options[selectedOption].votes++;
            s.voters.push(fp);
            save();

            showToast('Voto registrado');
            renderResults(s, s.options.reduce((a, o) => a + o.votes, 0));
        }

        function renderResults(s, total) {
            const coverHtml = s.cover
                ? `<img src="${s.cover}" style="width:100%;height:200px;object-fit:cover;border-radius:14px;margin-bottom:20px;" onerror="this.style.display='none'">`
                : '';

            const sorted = s.options.map((o, i) => ({ ...o, idx: i })).sort((a, b) => b.votes - a.votes);
            const maxVotes = Math.max(...s.options.map(o => o.votes), 1);

            document.getElementById('results-content').innerHTML = `
                ${coverHtml}
                <h2 style="margin-bottom:8px;">${s.title}</h2>
                ${s.desc ? `<p style="color:#aaa;margin-bottom:20px;">${s.desc}</p>` : ''}
                <div class="total-votes"><strong>${total}</strong> voto${total !== 1 ? 's' : ''} en total</div>
                ${sorted.map(o => {
                    const pct = total > 0 ? ((o.votes / total) * 100).toFixed(1) : 0;
                    return `
                        <div class="result-bar">
                            <div class="bar-header">
                                <div class="bar-info">
                                    ${o.img ? `<img src="${o.img}" onerror="this.style.display='none'">` : ''}
                                    <h4>${o.name}</h4>
                                </div>
                                <span class="percentage">${pct}%</span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill" style="width:${pct}%"></div>
                            </div>
                        </div>
                    `;
                }).join('')}
                <div class="share-buttons">
                    <button class="btn btn-whatsapp" onclick="shareWhatsApp('${s.id}')">📱 Compartir por WhatsApp</button>
                    <button class="btn btn-secondary" onclick="copyLink('${s.id}')">🔗 Copiar link</button>
                </div>
                <button class="btn btn-danger" onclick="deleteSurvey('${s.id}')" style="margin-top:12px;background:rgba(255,71,87,0.2);color:#ff4757;border:1px solid rgba(255,71,87,0.3);width:100%;justify-content:center;">🗑️ Eliminar encuesta</button>
            `;

            showView('view-results');
        }

        function shareWhatsApp(id) {
            const url = window.location.href.split('?')[0] + '?id=' + id;
            const text = `Mirá esta encuesta y votá: ${url}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function copyLink(id) {
            const url = window.location.href.split('?')[0] + '?id=' + id;
            navigator.clipboard.writeText(url).then(() => showToast('Link copiado'));
        }

        function deleteSurvey(id) {
            if (!confirm('¿Eliminar esta encuesta?')) return;
            surveys = surveys.filter(s => s.id !== id);
            save();
            showToast('Encuesta eliminada');
            showView('view-list');
        }

        // Init
        addOption();
        addOption();

        // Check URL for direct link
        const params = new URLSearchParams(window.location.search);
        const directId = params.get('id');
        if (directId && surveys.find(s => s.id === directId)) {
            openSurvey(directId);
        } else {
            renderList();
        }
    </script>
</body>
</html>
